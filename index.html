<!DOCTYPE html>
<html>
    <head>
        <title>Moja Pierwsza Strona</title>
        <!--JQuery-->
        <script src="https://code.jquery.com/jquery-3.6.1.js"></script>
        <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
                box-sizing: border-box;
            }

            body {
                background: linear-gradient(120deg, #0000ff, #000000);
                color: #ffffff;
            }

            #container {
                background: rgba(0,0,0,0.4);
                width: calc(100% * 2);
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="container">
            <p>Hello World!</p>
        </div>
        <script>
            $("#container").draggable();
        </script>
    </body>
</html>
